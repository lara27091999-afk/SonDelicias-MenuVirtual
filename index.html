<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>SON D'ELICIAS - Menú</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --acc:#22c55e;
  --bg:#f4f4f6; --bg2:#fff;
  --card:#fff;
  --t1:#0e0e10; --t2:#3a3a3e; --t3:#8a8a90;
  --border:#e5e5e8;
  --red:#e3342f; --green:#16a34a;
  --shadow:0 1px 3px rgba(0,0,0,.06);
  --r:14px;
}
body.dark{
  --bg:#0e0e12; --bg2:#1a1a20; --card:#1a1a20;
  --t1:#f5f5f7; --t2:#c9c9d1; --t3:#7d7d87;
  --border:#2a2a32;
  --shadow:0 1px 3px rgba(0,0,0,.4);
}
html,body{font-family:-apple-system,system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden}

/* ── Header ───────────────────────────────── */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:20}
.topbar-logo{width:36px;height:36px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;flex-shrink:0;box-shadow:var(--shadow)}
.topbar-name{flex:1;font-size:14px;font-weight:700;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topbar-clock{font-family:ui-monospace,Menlo,Consolas,monospace;text-align:right;color:var(--acc);font-size:13px;font-weight:700;line-height:1.1}
.topbar-clock-date{font-size:10px;color:var(--t3);font-weight:500;text-transform:capitalize;margin-top:1px}
.topbar-btn{width:36px;height:36px;border-radius:50%;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;color:var(--t1);flex-shrink:0}
.topbar-btn:active{opacity:.7}

.menu-hdr{padding:18px 14px 0}
.menu-hdr h1{font-size:24px;font-weight:800;letter-spacing:-.02em}
.menu-hdr .sub{font-size:13px;color:var(--t3);margin-top:2px}
.status-pill{display:inline-flex;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--border);border-radius:99px;padding:5px 12px;font-size:12px;color:var(--t2);margin-top:8px}
.dot-green{width:8px;height:8px;border-radius:50%;background:#22c55e}
.dot-red{width:8px;height:8px;border-radius:50%;background:#ef4444}

.action-row{padding:10px 14px;display:flex;gap:8px;flex-wrap:wrap}
.action-btn{background:var(--bg2);border:1px solid var(--border);border-radius:99px;padding:6px 12px;font-size:12px;color:var(--t1);cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.action-btn:active{opacity:.7}
.action-btn img{width:16px;height:16px;border-radius:3px}

/* ── Grid de categorías ───────────────────── */
.grid{padding:6px 14px 100px;display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:600px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:900px){.grid{grid-template-columns:repeat(4,1fr)}}
.cat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 12px;cursor:pointer;box-shadow:var(--shadow);transition:transform .12s,box-shadow .12s;display:flex;flex-direction:column;gap:6px;min-height:120px}
.cat-card:active{transform:scale(.97)}
.cat-emoji{font-size:30px;line-height:1}
.cat-name{font-weight:700;font-size:14px;color:var(--t1);line-height:1.2}
.cat-price{color:var(--acc);font-weight:700;font-size:13px;font-family:ui-monospace,Menlo,Consolas,monospace}
.empty{grid-column:1/-1;padding:40px;text-align:center;color:var(--t3);font-size:14px}

/* ── Floating cart ────────────────────────── */
.cart-fab{position:fixed;bottom:18px;left:14px;background:var(--acc);color:#fff;border:none;width:60px;height:60px;border-radius:50%;font-size:22px;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.25);z-index:30;display:flex;align-items:center;justify-content:center}
.cart-badge{position:absolute;top:-2px;right:-2px;background:#000;color:#fff;font-size:11px;font-weight:700;padding:2px 6px;border-radius:10px;min-width:20px;text-align:center}

/* ── Modal genérico (bottom sheet) ────────── */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:flex-end;justify-content:center;z-index:100}
.modal.open{display:flex;animation:fadein .15s}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.modal-box{background:var(--card);border-radius:18px 18px 0 0;width:100%;max-width:680px;max-height:92vh;display:flex;flex-direction:column;overflow:hidden;animation:slideup .2s}
@keyframes slideup{from{transform:translateY(40px)}to{transform:translateY(0)}}
.modal-grip{width:40px;height:4px;background:var(--border);border-radius:2px;margin:8px auto 4px}
.modal-hdr{padding:6px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.modal-back{background:none;border:none;font-size:20px;color:var(--t1);cursor:pointer;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.modal-hdr h3{flex:1;font-size:16px;font-weight:700}
.modal-x{background:none;border:none;font-size:22px;color:var(--t3);cursor:pointer;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.modal-body{flex:1;overflow-y:auto;padding:14px 16px}

/* ── Lista subcategorías ──────────────────── */
.sc-row{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--border);border-radius:12px;margin-bottom:8px;background:var(--bg2);cursor:pointer}
.sc-row:active{background:var(--bg)}
.sc-emoji{font-size:22px;line-height:1}
.sc-name{flex:1;font-weight:600;font-size:14px}
.sc-price{color:var(--acc);font-weight:700;font-size:14px;font-family:ui-monospace,Menlo,Consolas,monospace}

/* ── Modal producto ──────────────────────── */
.sect{margin-bottom:18px}
.sect-ttl{display:flex;align-items:center;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--t3);margin-bottom:8px}
.sect-ttl .progress{margin-left:auto;font-weight:600;font-size:11px;color:var(--t3);background:var(--bg);padding:2px 8px;border-radius:99px}
.sect-ttl .progress.ok{color:#fff;background:var(--green)}
.sect-ttl .progress.warn{color:#fff;background:#f59e0b}
.opt{padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;margin-bottom:8px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .15s;background:var(--bg2)}
.opt.selected{border-color:var(--acc);background:rgba(249,115,22,.04)}
.radio{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;position:relative}
.opt.selected .radio{border-color:var(--acc)}
.opt.selected .radio::after{content:'';position:absolute;inset:3px;border-radius:50%;background:var(--acc)}
.opt-name{flex:1;font-size:14px;font-weight:500}
.opt-price{color:var(--acc);font-weight:700;font-size:13px;font-family:ui-monospace,Menlo,Consolas,monospace}
.qty-step{display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:99px;padding:2px}
.qty-step button{background:var(--bg2);border:none;width:30px;height:30px;border-radius:50%;font-size:18px;font-weight:700;cursor:pointer;color:var(--acc);display:flex;align-items:center;justify-content:center;border:1px solid var(--border)}
.qty-step button:active{opacity:.6}
.qty-step span{min-width:22px;text-align:center;font-weight:700;font-size:13px}
.opt.qty-row{cursor:default}

/* ── Sticky footer del producto ──────────── */
.prod-foot{border-top:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px;background:var(--card)}
.prod-foot .qty-step{flex-shrink:0}
.prod-foot .total{flex:1;text-align:center;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:18px;font-weight:800;color:var(--acc)}
.btn-add{background:var(--acc);color:#fff;border:none;border-radius:12px;padding:11px 18px;font-size:14px;font-weight:700;cursor:pointer}
.btn-add:active{opacity:.85}
.btn-add[disabled]{opacity:.45;cursor:not-allowed}

/* ── Carrito ──────────────────────────────── */
.cart-item{padding:10px 0;border-bottom:1px solid var(--border)}
.cart-item:last-child{border-bottom:none}
.cart-item-hdr{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.cart-item-name{flex:1;font-weight:600;font-size:14px}
.cart-item-detail{font-size:11px;color:var(--t3);line-height:1.4;margin-top:2px}
.cart-item-del{background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;padding:4px}
.totals{padding:14px 0;border-top:2px solid var(--border);margin-top:8px;font-size:18px;font-weight:800;display:flex;justify-content:space-between;color:var(--acc);font-family:ui-monospace,Menlo,Consolas,monospace}
.modal-foot{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:10px;background:var(--card)}
.btn{display:inline-block;padding:11px 16px;background:var(--acc);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer}
.btn:active{opacity:.85}
.btn-ghost{background:var(--bg);color:var(--t1);border:1px solid var(--border)}
.btn-block{display:block;width:100%}

/* ── QR ──────────────────────────────────── */
.qr-box{padding:24px;text-align:center}
.qr-box img, .qr-box canvas{display:block;margin:0 auto 14px;max-width:280px;width:100%;height:auto;background:#fff;padding:8px;border-radius:8px}

/* ── Botón WhatsApp ──────────────────────── */
.btn-wa{background:#25D366;color:#fff;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-wa:active{opacity:.85}
.btn-wa img{width:20px;height:20px;object-fit:contain;flex-shrink:0}

/* ── Horario modal ───────────────────────── */
.sch-table{width:100%;border-collapse:collapse;font-size:13px}
.sch-table td{padding:8px 6px;border-bottom:1px solid var(--border)}
.sch-day{font-weight:600;color:var(--t1)}
.sch-time{color:var(--t2);text-align:right;font-family:ui-monospace,Menlo,Consolas,monospace}
.sch-closed{color:var(--red);font-weight:600}
.sch-today{background:rgba(249,115,22,.06)}
.sch-section-ttl{font-size:11px;font-weight:700;text-transform:uppercase;color:var(--t3);margin:12px 0 6px;letter-spacing:.05em}

/* ── Closed mask (no cerrable) ──────────── */
.closed-mask{position:fixed;inset:0;background:rgba(0,0,0,.9);color:#fff;display:none;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:24px;z-index:200}
.closed-mask.show{display:flex}
.closed-mask h2{font-size:22px;margin-bottom:10px}
.closed-mask p{font-size:13px;opacity:.85;line-height:1.5;max-width:380px;margin-bottom:14px}
.closed-mask .sch-table{max-width:340px;color:#fff}
.closed-mask .sch-table td{border-color:rgba(255,255,255,.15)}
.closed-mask .sch-table .sch-day{color:#fff}
.closed-mask .sch-table .sch-time{color:#e5e5e8}

</style>
</head>
<body>

<!-- ─── HEADER ─────────────────────────────────────── -->
<div class="topbar">
  <div class="topbar-logo">🍓</div>
  <div class="topbar-name">SON D'ELICIAS</div>
  <div class="topbar-clock">
    <div id="clock-time">--:--</div>
    <div class="topbar-clock-date" id="clock-date">—</div>
  </div>
  <button class="topbar-btn" id="dark-btn" onclick="toggleDark()" aria-label="Tema">🌙</button>
</div>

<div class="menu-hdr">
  <h1>Menú</h1>
  <div class="sub">Toca una categoría para ordenar</div>
  <div class="status-pill" id="status-pill"><span class="dot-green"></span><span id="status-text">Abierto</span></div>
</div>

<div class="action-row" id="action-row"></div>

<!-- ─── GRID DE CATEGORÍAS ────────────────────────── -->
<div class="grid" id="cat-grid"></div>

<!-- ─── FAB CARRITO ─────────────────────────────── -->
<button class="cart-fab" id="cart-fab" onclick="openCart()" style="display:none">
  🛒 <span class="cart-badge" id="cart-badge">0</span>
</button>

<!-- ─── MODAL: Lista de subcategorías ─────────── -->
<div class="modal" id="modal-sc-list">
  <div class="modal-box">
    <div class="modal-grip"></div>
    <div class="modal-hdr">
      <h3 id="modal-sc-list-title">Categoría</h3>
      <button class="modal-x" onclick="closeModal('modal-sc-list')">✕</button>
    </div>
    <div class="modal-body" id="modal-sc-list-body"></div>
  </div>
</div>

<!-- ─── MODAL: Producto (variantes, grupos, extras) ─ -->
<div class="modal" id="modal-product">
  <div class="modal-box">
    <div class="modal-grip"></div>
    <div class="modal-hdr">
      <button class="modal-back" onclick="closeModal('modal-product');setTimeout(()=>document.getElementById('modal-sc-list').classList.add('open'),50)">‹</button>
      <h3 id="modal-product-title">Producto</h3>
      <button class="modal-x" onclick="closeModal('modal-product')">✕</button>
    </div>
    <div class="modal-body" id="modal-product-body"></div>
    <div class="prod-foot">
      <div class="qty-step">
        <button onclick="changeProdQty(-1)">−</button>
        <span id="prod-qty">1</span>
        <button onclick="changeProdQty(1)">+</button>
      </div>
      <div class="total" id="prod-total">$0.00</div>
      <button class="btn-add" id="prod-add" onclick="addCurrentToCart()">Agregar al carrito</button>
    </div>
  </div>
</div>

<!-- ─── MODAL: Carrito ───────────────────────── -->
<div class="modal" id="modal-cart">
  <div class="modal-box">
    <div class="modal-grip"></div>
    <div class="modal-hdr">
      <h3>🛒 Tu pedido</h3>
      <button class="modal-x" onclick="closeModal('modal-cart')">✕</button>
    </div>
    <div class="modal-body" id="modal-cart-body"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal('modal-cart')">Seguir</button>
      <button class="btn btn-wa" style="flex:1" onclick="shareWhatsapp()">Enviar por WhatsApp</button>
    </div>
  </div>
</div>

<!-- ─── MODAL: QR ──────────────────────────── -->
<div class="modal" id="modal-qr">
  <div class="modal-box">
    <div class="modal-grip"></div>
    <div class="modal-hdr">
      <h3>📱 Muestra este QR</h3>
      <button class="modal-x" onclick="closeModal('modal-qr')">✕</button>
    </div>
    <div class="modal-body qr-box" id="modal-qr-body"></div>
    <div class="modal-foot">
      <button class="btn btn-block" onclick="closeModal('modal-qr')">Listo</button>
    </div>
  </div>
</div>

<!-- ─── MODAL: Horarios (cerrable) ────────── -->
<div class="modal" id="modal-sch">
  <div class="modal-box">
    <div class="modal-grip"></div>
    <div class="modal-hdr">
      <h3>🕐 Horarios</h3>
      <button class="modal-x" onclick="closeModal('modal-sch')">✕</button>
    </div>
    <div class="modal-body" id="modal-sch-body"></div>
    <div class="modal-foot">
      <button class="btn btn-block" onclick="closeModal('modal-sch')">Cerrar</button>
    </div>
  </div>
</div>

<!-- ─── Closed mask (NO cerrable) ─────────── -->
<div class="closed-mask" id="closed-mask">
  <h2>⏰ Pedidos cerrados</h2>
  <p>Por ahora no aceptamos pedidos en línea. Estos son nuestros horarios:</p>
  <div id="closed-sch"></div>
</div>

/* ─── Reloj ─────────────────────────────────── */
function updateClock(){
  const now = new Date();
  const hh = now.getHours(), mm = now.getMinutes();
  const ap = hh >= 12 ? 'p.m.' : 'a.m.';
  let h12 = hh % 12; if (h12 === 0) h12 = 12;
  document.getElementById('clock-time').textContent =
    String(h12).padStart(2,'0')+':'+String(mm).padStart(2,'0')+' '+ap;
  const ds = now.toLocaleDateString('es-MX', { weekday:'short', day:'2-digit', month:'short' });
  document.getElementById('clock-date').textContent = ds;
}

/* ─── Tema (dark mode) ─────────────────────── */
function applyDarkPreference(){
  const saved = localStorage.getItem('mw_dark');
  let dark;
  if (saved === '1') dark = true;
  else if (saved === '0') dark = false;
  else dark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  document.body.classList.toggle('dark', dark);
  document.getElementById('dark-btn').textContent = dark ? '☀️' : '🌙';
}
function toggleDark(){
  const isDark = document.body.classList.toggle('dark');
  localStorage.setItem('mw_dark', isDark ? '1' : '0');
  document.getElementById('dark-btn').textContent = isDark ? '☀️' : '🌙';
}
applyDarkPreference();

/* ─── Horario ──────────────────────────────── */
function isOnlineOpen(){
  const now = new Date();
  const d = now.getDay();
  const sch = (DATA.scheduleOnline||{})[d];
  if (!sch || sch.closed) return false;
  const hhmm = now.toTimeString().slice(0,5);
  return hhmm >= (sch.open||'00:00') && hhmm <= (sch.close||'23:59');
}
function renderScheduleTable(sch, todayIdx){
  let html = '<table class="sch-table">';
  for (let i=0;i<7;i++){
    const d = sch[i]||{closed:true};
    const cls = i === todayIdx ? 'sch-today' : '';
    if (d.closed){
      html += '<tr class="'+cls+'"><td class="sch-day">'+DAYS[i]+'</td><td class="sch-time sch-closed">Cerrado</td></tr>';
    } else {
      html += '<tr class="'+cls+'"><td class="sch-day">'+DAYS[i]+'</td><td class="sch-time">'+d.open+' — '+d.close+'</td></tr>';
    }
  }
  html += '</table>';
  return html;
}
function openSchedule(){
  const today = new Date().getDay();
  const body = document.getElementById('modal-sch-body');
  body.innerHTML =
    '<div class="sch-section-ttl">💻 Pedidos en línea</div>' +
    renderScheduleTable(DATA.scheduleOnline||{}, today) +
    '<div class="sch-section-ttl">🏪 Tienda física</div>' +
    renderScheduleTable(DATA.schedulePhysical||{}, today);
  document.getElementById('modal-sch').classList.add('open');
}
function applyScheduleStatus(){
  const open = isOnlineOpen();
  const pill = document.getElementById('status-pill');
  const txt  = document.getElementById('status-text');
  if (open){
    pill.querySelector('span:first-child').className = 'dot-green';
    txt.textContent = 'Abierto - Toma tu pedido';
  } else {
    pill.querySelector('span:first-child').className = 'dot-red';
    txt.textContent = 'Cerrado en línea';
    /* Mostrar máscara no-cerrable */
    const today = new Date().getDay();
    document.getElementById('closed-sch').innerHTML = renderScheduleTable(DATA.scheduleOnline||{}, today);
    document.getElementById('closed-mask').classList.add('show');
  }
}

/* ─── Helpers de precio por subcategoría ──── */
function scPriceRange(sc){
  /* Devuelve {min,max} considerando subcategoría + variantes */
  const base = sc.price || 0;
  if (!sc.variants.length) return { min:base, max:base };
  const prices = sc.variants.map(v => base + (v.priceAdd||0));
  return { min: Math.min(...prices), max: Math.max(...prices) };
}
function catPriceRange(cat){
  let min = Infinity, max = -Infinity, any = false;
  cat.subcategories.forEach(sc => {
    const r = scPriceRange(sc);
    if (r.max > 0) any = true;
    if (r.min < min) min = r.min;
    if (r.max > max) max = r.max;
  });
  return any ? { min, max } : null;
}

/* ─── Grid de categorías ──────────────────── */
function renderGrid(){
  const root = document.getElementById('cat-grid');
  if (!DATA.categories.length){
    root.innerHTML = '<div class="empty">📭 Sin productos cargados</div>';
    return;
  }
  root.innerHTML = DATA.categories.map((c,ci) => {
    const n = c.subcategories.length;
    const range = catPriceRange(c);
    let priceHtml = '';
    if (DATA.priceMode === 'separate' && range){
      priceHtml = range.min === range.max
        ? '<div class="cat-price">'+money(range.min)+'</div>'
        : '<div class="cat-price">'+money(range.min)+' — '+money(range.max)+'</div>';
    }
    return '<div class="cat-card" onclick="openCategory('+ci+')">'+
      '<div class="cat-emoji">'+(c.emoji?esc(c.emoji):'🍽')+'</div>'+
      '<div class="cat-name">'+esc(c.name)+'</div>'+
      '<div style="font-size:11px;color:var(--t3)">'+n+' '+(n===1?'tamaño':'tamaños')+'</div>'+
      priceHtml+
    '</div>';
  }).join('');
}

  sc.groups.forEach((g, gi) => {
    html += '<div class="sect"><div class="sect-ttl">'+(g.emoji?esc(g.emoji)+' ':'')+esc(g.name)+
      '<span class="progress" id="prog-g'+gi+'">0/'+g.max+(g.min>0?' · mín '+g.min:'')+'</span></div>';
    g.items.forEach((it, ii) => {
      const q = (currentSc.groups[gi]||{})[ii] || 0;
      html += '<div class="opt qty-row">'+
        '<div class="opt-name">'+esc(it.name)+'</div>'+
        '<div class="qty-step">'+
          '<button onclick="changeGroupQty('+gi+','+ii+',-1)">−</button>'+
          '<span id="gq-'+gi+'-'+ii+'">'+q+'</span>'+
          '<button onclick="changeGroupQty('+gi+','+ii+',1)">+</button>'+
        '</div>'+
      '</div>';
    });
    html += '</div>';
  });

  /* Extras */
  sc.extras.forEach((g, gi) => {
    const ppu = g.pricePerUnit || 0;
    html += '<div class="sect"><div class="sect-ttl">★ '+(g.emoji?esc(g.emoji)+' ':'')+esc(g.name)+
      (ppu>0?' · +'+money(ppu)+' c/u':'')+
      '</div>';
    g.items.forEach((it, ii) => {
      const q = (currentSc.extras[gi]||{})[ii] || 0;
      html += '<div class="opt qty-row">'+
        '<div class="opt-name">'+esc(it.name)+'</div>'+
        '<div class="qty-step">'+
          '<button onclick="changeExtraQty('+gi+','+ii+',-1)">−</button>'+
          '<span id="eq-'+gi+'-'+ii+'">'+q+'</span>'+
          '<button onclick="changeExtraQty('+gi+','+ii+',1)">+</button>'+
        '</div>'+
      '</div>';
    });
    html += '</div>';
  });

  if (!html) html = '<div class="empty">Sin opciones adicionales</div>';
  body.innerHTML = html;
}

function selectVariant(vi){
  currentSc.variantIdx = vi;
  renderProductBody();
  updateProductTotal();
}

function changeGroupQty(gi, ii, delta){
  const sc = DATA.categories[currentSc.catIdx].subcategories[currentSc.scIdx];
  const g = sc.groups[gi];
  if (!currentSc.groups[gi]) currentSc.groups[gi] = {};
  const cur = currentSc.groups[gi][ii] || 0;
  let total = 0; Object.values(currentSc.groups[gi]).forEach(q => total += q);
  if (delta > 0 && total >= g.max) return;
  const next = Math.max(0, cur + delta);
  if (next === 0) delete currentSc.groups[gi][ii];
  else currentSc.groups[gi][ii] = next;
  document.getElementById('gq-'+gi+'-'+ii).textContent = next;
  /* Actualizar progress */
  total = 0; Object.values(currentSc.groups[gi]||{}).forEach(q => total += q);
  const prog = document.getElementById('prog-g'+gi);
  if (prog){
    if (total === 0) prog.className = 'progress', prog.textContent = '0/'+g.max+(g.min>0?' · mín '+g.min:'');
    else if (total >= g.min) prog.className = 'progress ok', prog.textContent = total+'/'+g.max+' ✓';
    else prog.className = 'progress warn', prog.textContent = total+'/'+g.max+' · mín '+g.min;
  }
  updateProductTotal();
}

function changeExtraQty(gi, ii, delta){
  const sc = DATA.categories[currentSc.catIdx].subcategories[currentSc.scIdx];
  const g = sc.extras[gi];
  if (!currentSc.extras[gi]) currentSc.extras[gi] = {};
  const cur = currentSc.extras[gi][ii] || 0;
  let total = 0; Object.values(currentSc.extras[gi]).forEach(q => total += q);
  if (delta > 0 && g.max && total >= g.max) return;
  const next = Math.max(0, cur + delta);
  if (next === 0) delete currentSc.extras[gi][ii];
  else currentSc.extras[gi][ii] = next;
  document.getElementById('eq-'+gi+'-'+ii).textContent = next;
  updateProductTotal();
}

function changeProdQty(delta){
  currentSc.qty = Math.max(1, (currentSc.qty||1) + delta);
  document.getElementById('prod-qty').textContent = currentSc.qty;
  updateProductTotal();
}

function computeUnitPrice(){
  const sc = DATA.categories[currentSc.catIdx].subcategories[currentSc.scIdx];
  const base = sc.price || 0;
  const v = currentSc.variantIdx >= 0 ? sc.variants[currentSc.variantIdx] : null;
  const varP = v ? (v.priceAdd || 0) : 0;
  let extP = 0;
  Object.entries(currentSc.extras||{}).forEach(([gi, items]) => {
    const g = sc.extras[gi];
    const ppu = g.pricePerUnit || 0;
    Object.values(items).forEach(q => extP += ppu * q);
  });
  return base + varP + extP;
}

function updateProductTotal(){
  const unit = computeUnitPrice();
  const total = unit * (currentSc.qty || 1);
  document.getElementById('prod-total').textContent = money(total);
}

function addCurrentToCart(){
  const sc = DATA.categories[currentSc.catIdx].subcategories[currentSc.scIdx];
  const c = DATA.categories[currentSc.catIdx];
  /* Validar variante */
  if (sc.variants.length && currentSc.variantIdx < 0){
    alert('Selecciona una variante');
    return;
  }
  /* Validar grupos min/max */
  for (let gi=0; gi<sc.groups.length; gi++){
    const g = sc.groups[gi];
    let total = 0;
    Object.values(currentSc.groups[gi]||{}).forEach(q => total += q);
    if (g.min && total < g.min){ alert('Debes seleccionar al menos '+g.min+' de "'+g.name+'"'); return; }
    if (g.max && total > g.max){ alert('Máximo '+g.max+' de "'+g.name+'"'); return; }
  }
  const variant = currentSc.variantIdx >= 0 ? sc.variants[currentSc.variantIdx] : null;
  const groups = [];
  Object.entries(currentSc.groups).forEach(([gi, items]) => {
    const g = sc.groups[gi];
    const arr = [];
    Object.entries(items).forEach(([ii, qty]) => arr.push({ name: g.items[ii].name, qty }));
    if (arr.length) groups.push({ groupName: g.name, items: arr });
  });
  const extras = [];
  Object.entries(currentSc.extras).forEach(([gi, items]) => {
    const g = sc.extras[gi];
    const arr = [];
    Object.entries(items).forEach(([ii, qty]) => arr.push({ name: g.items[ii].name, qty }));
    if (arr.length) extras.push({ groupName: g.name, items: arr });
  });
  cart.push({
    catName: c.name,
    scName: sc.name,
    varName: variant ? variant.name : null,
    groups, extras,
    qty: currentSc.qty || 1,
    unitPrice: computeUnitPrice()
  });
  closeModal('modal-product');
  updateCartFab();
}

/* ─── Carrito ──────────────────────────── */
function updateCartFab(){
  const fab = document.getElementById('cart-fab');
  const badge = document.getElementById('cart-badge');
  if (cart.length){
    fab.style.display = 'flex';
    badge.textContent = cart.reduce((s,c)=>s+c.qty,0);
  } else {
    fab.style.display = 'none';
  }
}
function openCart(){
  if (!cart.length) return;
  renderCart();
  document.getElementById('modal-cart').classList.add('open');
}
function renderCart(){
  const body = document.getElementById('modal-cart-body');
  let total = 0;
  let html = cart.map((c,i) => {
    const sub = c.unitPrice * c.qty;
    total += sub;
    let det = '';
    if (c.varName) det += '· '+esc(c.varName);
    c.groups.forEach(g => det += '<div>+ '+esc(g.groupName)+': '+g.items.map(it=>esc(it.name)+'×'+it.qty).join(', ')+'</div>');
    c.extras.forEach(g => det += '<div>★ '+esc(g.groupName)+': '+g.items.map(it=>esc(it.name)+'×'+it.qty).join(', ')+'</div>');
    return '<div class="cart-item"><div class="cart-item-hdr"><div class="cart-item-name">'+esc(c.catName)+' · '+esc(c.scName)+'</div>'+
      '<div class="qty-step"><button onclick="changeCartQty('+i+',-1)">−</button><span>'+c.qty+'</span><button onclick="changeCartQty('+i+',1)">+</button></div>'+
      '<button class="cart-item-del" onclick="removeCartItem('+i+')">🗑</button></div>'+
      '<div class="cart-item-detail">'+det+'</div>'+
      '<div style="text-align:right;font-weight:700;color:var(--acc);margin-top:4px;font-family:ui-monospace,Menlo,Consolas,monospace">'+money(sub)+'</div></div>';
  }).join('');
  html += '<div class="totals"><span>Total estimado</span><span>'+money(total)+'</span></div>';
  body.innerHTML = html;
}
function changeCartQty(i, delta){
  cart[i].qty = Math.max(1, cart[i].qty + delta);
  renderCart(); updateCartFab();
}
function removeCartItem(i){
  cart.splice(i,1);
  renderCart(); updateCartFab();
  if (!cart.length) closeModal('modal-cart');
}

function generateQR(){
  if (!cart.length) return;
  const payload = { items: cart.map(c => ({
    catName: c.catName, scName: c.scName, varName: c.varName,
    groups: c.groups, extras: c.extras, qty: c.qty
  })) };
  const json = JSON.stringify(payload);
  const b64 = btoa(unescape(encodeURIComponent(json)));
  const text = 'MN1|' + b64;
  const qr = qrcode(0, 'L');
  qr.addData(text);
  qr.make();
  const img = qr.createImgTag(5, 8);
  document.getElementById('modal-qr-body').innerHTML = img +
    '<div style="font-size:13px;color:var(--t3);margin-top:6px">Muestra este código al personal para registrar tu pedido</div>';
  closeModal('modal-cart');
  document.getElementById('modal-qr').classList.add('open');
}

function buildWhatsappText(){
  const hour = new Date().getHours();
  const greeting = hour < 12 ? 'Buenos días' : hour < 19 ? 'Buenas tardes' : 'Buenas noches';
  let total = 0;
  const lines = [];
  lines.push(greeting + ', este es mi pedido:');
  lines.push('');
  cart.forEach(c => {
    const sub = c.unitPrice * c.qty;
    total += sub;
    const qtyStr = c.qty > 1 ? ' ×' + c.qty : '';
    lines.push('*' + c.catName + ' · ' + c.scName + qtyStr + '*');
    if (c.varName) lines.push('· ' + c.varName);
    c.groups.forEach(g => {
      const items = g.items.map(it => it.qty > 1 ? it.name + '×' + it.qty : it.name).join(', ');
      lines.push('_+ ' + g.groupName + ': ' + items + '_');
    });
    c.extras.forEach(g => {
      const items = g.items.map(it => it.qty > 1 ? it.name + '×' + it.qty : it.name).join(', ');
      lines.push('_★ ' + g.groupName + ': ' + items + '_');
    });
    lines.push('');
  });
  lines.push('*TOTAL: ' + money(total) + '*');
  return lines.join('\n');
}

function shareWhatsapp(){
  const text = buildWhatsappText();
  const phone = '52811200176'; /* Número de prueba: +52 81 1234 5678 */
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).catch(function(){});
  }
  window.open('https://wa.me/' + phone + '?text=' + encodeURIComponent(text), '_blank');
}

function closeModal(id){ document.getElementById(id).classList.remove('open'); }

/* Cerrar modal con clic fuera */
document.querySelectorAll('.modal').forEach(m => {
  m.addEventListener('click', e => {
    if (e.target === m && m.id !== 'closed-mask') closeModal(m.id);
  });
});

/* Init */
renderGrid();
renderActionRow();
applyScheduleStatus();
setInterval(applyScheduleStatus, 60000);
</script>

    // Closed: Saturday (day 6)
    // Open: Sunday (0), Monday (1), Tuesday (2), Wednesday (3), Thursday (4), Friday (5)

    const isVirtualStoreOpen = () => {
      const now = new Date();
      const dayOfWeek = now.getDay(); // 0 = Sunday, 6 = Saturday
      const hours = now.getHours();
      const minutes = now.getMinutes();
      const currentTime = hours * 60 + minutes; // Convert to minutes since midnight

      // Saturday is always closed
      if (dayOfWeek === 6) return false;

      // Virtual store hours: 15:00 (3:00pm) to 22:30 (10:30pm)
      const openTime = 15 * 60;  // 15:00 = 900 minutes
      const closeTime = 22 * 60 + 30; // 22:30 = 1350 minutes

      return currentTime >= openTime && currentTime < closeTime;
    };

    // --- CANVAS UTILS ---

    // Helper to wrap text in Canvas
    function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
      const words = text.split(' ');
      let line = '';
      for (let n = 0; n < words.length; n++) {
        const testLine = line + words[n] + ' ';
        const metrics = ctx.measureText(testLine);
        const testWidth = metrics.width;
        if (testWidth > maxWidth && n > 0) {
          ctx.fillText(line, x, y);
          line = words[n] + ' ';
          y += lineHeight;
        } else {
          line = testLine;
        }
      }
      ctx.fillText(line, x, y);
      return y + lineHeight;
    }

    const generateTicketImage = (items, orderInfo, total) => {

      // Helper function that handles drawing (or measuring)
      // returns the final Y position
      const renderTicket = (ctx, onlyMeasure = false) => {
        // Setup fonts
        if (!onlyMeasure) {
          ctx.fillStyle = '#f8fafc';
          ctx.fillRect(0, 0, ctx.canvas.width, ctx.canvas.height);
        }

        const drawText = (text, x, y, font, color, align = 'left') => {
          if (onlyMeasure) return;
          ctx.font = font;
          ctx.fillStyle = color;
          ctx.textAlign = align;
          ctx.fillText(text, x, y);
        };

        const drawRect = (x, y, w, h, color, strokeColor = null) => {
          if (onlyMeasure) return;
          ctx.fillStyle = color;
          ctx.fillRect(x, y, w, h);
          if (strokeColor) {
            ctx.strokeStyle = strokeColor;
            ctx.strokeRect(x, y, w, h);
          }
        };

        // 1. Header
        drawRect(20, 20, 460, 80, '#cbd5e1');
        drawText("TICKET DE PEDIDO", 250, 60, 'bold 30px sans-serif', '#0f172a', 'center');
        drawText(new Date().toLocaleString(), 250, 85, '16px sans-serif', '#0f172a', 'center');

        let y = 140;

        // Divider
        if (!onlyMeasure) {
          ctx.strokeStyle = '#94a3b8';
          ctx.setLineDash([5, 5]);
          ctx.beginPath(); ctx.moveTo(30, y); ctx.lineTo(470, y); ctx.stroke();
          ctx.setLineDash([]);
        }
        y += 30;

        // 2. Order Items
        drawText("DATOS DEL PEDIDO:", 30, y, 'bold 20px sans-serif', '#0f172a'); y += 30;

        items.forEach(item => {
          drawText(item.categoryName, 40, y, 'bold 12px sans-serif', '#be185d'); y += 18;

          if (!onlyMeasure) {
            ctx.font = 'bold 18px sans-serif';
            ctx.fillStyle = '#0f172a';
            ctx.textAlign = 'left';
            ctx.fillText(item.productName, 40, y);
            ctx.textAlign = 'right';
            ctx.fillText(`$${item.totalPrice.toFixed(2)}`, 460, y);
          }
          y += 22;

          drawText(item.variantName, 40, y, 'italic 15px sans-serif', '#475569'); y += 20;

          if (item.selections) {
            const dummyCtx = onlyMeasure ? document.createElement('canvas').getContext('2d') : ctx;
            if (onlyMeasure) dummyCtx.font = '14px sans-serif';
            else ctx.font = '14px sans-serif';

            Object.keys(item.selections).forEach(gid => {
              const grp = item.elementConfig.find(g => g.id === gid);
              const sels = item.selections[gid];
              if (sels && sels.length) {
                const names = sels.map(s => s.name).join(', ');
                // Use real wrapText to get exact lines
                if (!onlyMeasure) ctx.fillStyle = '#64748b';
                y = wrapText(dummyCtx, `- ${grp.name}: ${names}`, 50, y, 400, 18);
              }
            });
          }
          y += 10;
          drawRect(40, y, 420, 1, '#e2e8f0');
          y += 20;
        });

        y += 20;

        // 3. Total Bar
        drawRect(30, y, 440, 70, '#0f172a');
        if (!onlyMeasure) {
          ctx.fillStyle = '#ffffff';
          ctx.font = 'bold 28px sans-serif';
          ctx.textAlign = 'left'; ctx.fillText("TOTAL A PAGAR:", 50, y + 45);
          ctx.textAlign = 'right';
          ctx.fillStyle = '#f472b6'; ctx.fillText(`$${total.toFixed(2)}`, 450, y + 45);
        }

        y += 100; // Space after total

        // 4. Footer ID
        drawText(`#${orderInfo.ticketId}`, 250, y, 'bold 30px monospace', '#94a3b8', 'center');

        y += 50; // Bottom Padding

        return y;
      };

      // PASS 1: Calculate exact height
      const finalHeight = renderTicket(null, true);

      // PASS 2: Draw
      const canvas = document.createElement('canvas');
      canvas.width = 500;
      canvas.height = finalHeight;
      const ctx = canvas.getContext('2d');
      // Fix background since helper expects context
      renderTicket(ctx, false);

      return canvas.toDataURL('image/png');
    };

    const generatePaymentImage = (ticketId, total) => {

        ctx.font = '24px serif';
        ctx.fillStyle = '#000';
        ctx.fillText(emoji, 50, y);

        ctx.font = 'bold 20px sans-serif';
        ctx.fillStyle = '#64748b'; // slate-500
        ctx.fillText(label, 90, y);

        ctx.font = 'bold 24px sans-serif';
        ctx.fillStyle = '#0f172a'; // slate-900
        ctx.fillText(value, 90, y + 30);
        y += 80;
      };

      drawRow("🏦", "BANCO:", "BANCOPPEL");
      drawRow("👤", "TITULAR:", "Leonor Ortiz Cordova");
      drawRow("💳", "CLABE:", "13 7580 1030 2125 6738");

      // Total Exacto
      y += 10;
      ctx.textAlign = 'center';
      ctx.fillStyle = '#0f172a';
      ctx.font = 'bold 20px sans-serif';
      ctx.fillText("MONTO TOTAL EXACTO:", 250, y); y += 35;
      ctx.font = 'bold 40px sans-serif';
      ctx.fillStyle = '#be185d';
      ctx.fillText(`$${total.toFixed(2)}`, 250, y); y += 50;

      // Concept Box
      ctx.fillStyle = '#fce7f3'; // pink-100
      ctx.fillRect(40, y, 420, 90);
      ctx.strokeStyle = '#fbcfe8';
      ctx.strokeRect(40, y, 420, 90);

      ctx.fillStyle = '#831843';
      ctx.font = 'bold 18px sans-serif';
      ctx.fillText("CONCEPTO REQUERIDO:", 250, y + 30);
      ctx.font = 'bold 45px monospace';
      ctx.fillText(ticketId, 250, y + 70);

      y += 110;
      // Warning Message
      ctx.fillStyle = '#ef4444'; // red-500
      ctx.font = 'bold 14px sans-serif';
      ctx.textAlign = 'center'; // FORCE CENTER ALIGNMENT
      wrapText(ctx, "⚠ RECUERDA: Tu pedido NO se preparará hasta recibir el comprobante con el monto EXACTO y este número de concepto.", 250, y, 400, 20);

      downloadCanvas(canvas, `Pago_${ticketId}.png`);
    };

    const downloadCanvas = (canvas, filename) => {
      try {
        const link = document.createElement('a');
        link.download = filename;
        link.href = canvas.toDataURL('image/png');
        link.click();
      } catch (e) { alert("No se pudo descargar la imagen"); }
    };

            <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-30 flex gap-3">

              <button onClick={() => setShowScheduleModal(true)} className="flex items-center gap-2 bg-slate-800 border border-slate-600 px-6 py-3 rounded-full shadow-xl active:scale-95 transition-all text-slate-300 font-bold hover:text-white hover:border-slate-500">

                <button onClick={closeModal} className="text-slate-400 hover:text-white p-2"><Icons.Back className="w-6 h-6" /></button>
                <span className="font-bold text-lg">TU PEDIDO ({cart.length})</span>
                <div className="w-10" />

              <div className="flex-1 overflow-y-auto p-4 space-y-3">
                {cart.length === 0 ? (
                  <div className="h-full flex flex-col items-center justify-center text-slate-500 opacity-50"><Icons.Cart className="w-16 h-16 mb-4" /><p>Tu carrito está vacío</p></div>
                ) : (
                  cart.map((item, idx) => (
                    <div key={idx} className="bg-slate-800 p-4 rounded-xl border border-slate-700 flex flex-col gap-2">
                      <div className="text-[10px] font-bold text-pink-500 uppercase tracking-wider">{item.categoryName}</div>
                      <div className="flex justify-between items-start">
                        <div><div className="font-bold text-lg text-white">{item.productName}</div><div className="text-slate-400 text-sm">{item.variantName}</div></div>
                        <div className="font-bold text-xl">${item.totalPrice.toFixed(2)}</div>
                      </div>
                      {item.elementConfig && <div className="text-xs text-slate-400 bg-slate-900/50 p-2 rounded border border-slate-800">
                        {Object.keys(item.selections || {}).map(gid => {

                      <div className="flex justify-end gap-3 mt-1">

    // --- SUBCOMPONENTS (REFINED) ---

    function ProductConfigModal({ product, categoryName, initialValues, editIndex, onClose, onConfirm }) {
      const [variant, setVariant] = useState(initialValues ? (product.variants?.find(v => v.id === initialValues.variantId) || null) : (product.variants?.length === 1 ? product.variants[0] : null));
      const [selections, setSelections] = useState(initialValues ? initialValues.selections : {});
      const [qty, setQty] = useState(1);

      // Wizard logic: step -1 = variant selection, step 0...N = element groups
      const [step, setStep] = useState((variant || !product.variants || product.variants.length === 0) ? 0 : -1);

      const elements = product.elements || [];
      const currentElement = elements[step];

      const toggleItem = (elementId, item, maxQty, allowRepeat, type) => {
        if (type === 'radio') {
          setSelections({ ...selections, [elementId]: [item] });
          handleNext();
          return;
        }

        const current = selections[elementId] || [];
        const totalSelected = current.length;
        const countOfItem = current.filter(i => i.id === item.id).length;

        if (allowRepeat) {
          if (totalSelected < maxQty) {
            setSelections({ ...selections, [elementId]: [...current, item] });
          } else if (countOfItem > 0) {
            const idx = current.findIndex(i => i.id === item.id);
            const newArr = [...current];
            newArr.splice(idx, 1);
            setSelections({ ...selections, [elementId]: newArr });
          }
        } else {
          if (countOfItem > 0) {
            setSelections({ ...selections, [elementId]: current.filter(i => i.id !== item.id) });
          } else {
            if (totalSelected < maxQty) {
              if (maxQty === 1 && totalSelected === 1) {
                setSelections({ ...selections, [elementId]: [item] });
              } else {
                setSelections({ ...selections, [elementId]: [...current, item] });
              }
            }
          }
        }
      };

      const setNone = (elementId) => {
        setSelections({ ...selections, [elementId]: [] });
        handleNext();
      };

      const handleNext = () => {
        if (step < elements.length - 1) {
          setStep(step + 1);
        } else {
          setStep(999);
        }
      };

      const handleBack = () => {
        if (step > 0) {
          setStep(step - 1);
        } else if (step === 0 && (product.variants || []).length > 1) {
          setStep(-1);
        } else {
          onClose();
        }
      };

      const selectVariant = (v) => {
        setVariant(v);
        if (elements.length > 0) {
          setStep(0);
        } else {
          setStep(999);
        }
      };

      const calculateTotal = () => {
        let t = 0;
        if (variant) t += variant.price;
        // Add prices from all selections (including radio buttons in elements)
        Object.values(selections).flat().forEach(i => t += (i.price || 0));
        return t;
      };

      const handleConfirm = () => {
        const itemData = {
          productId: product.id, productName: product.name, categoryName,
          variantId: variant ? variant.id : null, variantName: variant ? variant.name : null,
          selections, elementConfig: product.elements, totalPrice: calculateTotal()
        };
        onConfirm(itemData, qty);
      };

      const isFinished = step === 999;
      // Dynamic questions based on product and step
      let stepTitle = `Selecciona ${currentElement?.name}`;

      let helperTitle = '¡Hola!';
      let helperText = 'Elige lo que más te guste.';

      if (step === -1) {
        helperTitle = '¡Empecemos!';
        helperText = 'Selecciona la variante que más te guste.';
      } else if (currentElement) {
        if (product.id === 1 || product.id === 7 || product.id === 8 || product.id === 11) {
          // Fresas con Crema, Crepas Dulces, Pastel Tortuga, Tostitos
          if (currentElement.id === 'size') {
            helperTitle = '¡Hora de elegir!';
            helperText = 'Ahora selecciona el tamaño deseado.';
          } else if (currentElement.id === 'variant' || currentElement.id === 'presentacion') {
            helperTitle = '¡Dale sabor!';
            helperText = 'Selecciona la variante que más te guste.';
          } else if (currentElement.id === 'bases') {
            helperTitle = 'Base deliciosa';
            helperText = `Prepárala con las bases disponibles, elige ${currentElement.max} máximo.`;
          } else if (currentElement.id === 'toppings' || currentElement.id === 'fruta') {
            helperTitle = '¡Un toque especial!';
            helperText = `Selecciona ${currentElement.max} máximo${currentElement.allowRepeat ? ', puedes repetir' : ''}.`;
          } else if (currentElement.id === 'jarabes') {
            helperTitle = '¡El final perfecto!';
            helperText = `Selecciona máximo ${currentElement.max} jarabe.`;
          } else {
            helperTitle = `¡Elige ${currentElement.name}!`;
            helperText = currentElement.type !== 'radio' ? `Puedes elegir máximo ${currentElement.max} ${currentElement.allowRepeat ? 'opciones (puedes repetir)' : 'opciones'}.` : 'Selecciona una opción.';
          }
        } else if (product.categoryId === 4) { // Bebidas
          if (currentElement.id === 'leche') {
            helperTitle = 'Tipo de Leche';
            helperText = 'Selecciona tu tipo de leche favorita.';
          } else {
            helperTitle = `¡Elige ${currentElement.name}!`;
            helperText = 'Selecciona una opción.';
          }
        } else {
          helperTitle = `¡Elige ${currentElement.name}!`;
          helperText = currentElement.type !== 'radio' ? `Puedes elegir máximo ${currentElement.max} ${currentElement.allowRepeat ? 'opcionalmente repetidos' : 'opciones'}.` : 'Selecciona una opción.';
        }
      }

      return (
        <div className="fixed inset-0 z-50 bg-slate-900 flex flex-col animate-in slide-in-from-bottom duration-300">
          <div className="h-16 bg-slate-800 flex items-center justify-between px-4 border-b border-slate-700">
            <button onClick={handleBack} className="text-slate-400 p-2"><Icons.Back /></button>
            <div className="text-center">
              <span className="text-xs font-bold text-pink-500 uppercase block leading-tight">{product.name}</span>
              <span className="text-[10px] text-slate-500 uppercase tracking-widest">{isFinished ? 'Resumen' : (step === -1 ? 'Selecciona' : `Paso ${step + 1} de ${elements.length}`)}</span>
            </div>
            <button onClick={onClose} className="text-slate-400 p-2"><Icons.Close /></button>
          </div>

          <div className="flex-1 overflow-y-auto p-5 scrollbar-hide">

            {/* INLINE HELPER BANNER */}
            {!isFinished && (
              <div className="bg-slate-800 border border-pink-500/30 rounded-2xl p-4 mb-6 flex items-start gap-4 shadow-lg animate-in slide-in-from-top duration-300">
                <div className="text-4xl animate-bounce">🙋‍♀️</div>
                <div className="flex-1">
                  <h4 className="font-black text-pink-400 text-lg leading-tight mb-1">{helperTitle}</h4>
                  <p className="text-sm text-slate-300 font-medium leading-snug">{helperText}</p>
                </div>
              </div>
            )}

            {step === -1 && (
              <div className="space-y-6 animate-in fade-in slide-in-from-right duration-300">
                <div className="grid grid-cols-1 gap-3">
                  {product.variants.map(v => (
                    <button key={v.id} onClick={() => selectVariant(v)}
                      className="group bg-slate-800 border-2 border-slate-700 p-5 rounded-2xl flex justify-between items-center hover:border-pink-500 transition-all active:scale-95">
                      <div className="text-left">
                        <div className="font-bold text-lg group-hover:text-pink-400 transition-colors uppercase">{v.name}</div>
                        <div className="text-slate-400 text-sm">Listo en unos minutos</div>
                      </div>
                      <div className="text-xl font-black text-white">${v.price}</div>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {step >= 0 && step < elements.length && (
              <div key={step} className="space-y-4 animate-in fade-in slide-in-from-right duration-300 relative">
                <div className="text-center mb-2">
                  <h3 className="text-2xl font-black uppercase tracking-tight text-white/90">{stepTitle}</h3>
                </div>

                <div className="grid grid-cols-1 gap-2">
                  {currentElement.type !== 'radio' && (
                    <button onClick={() => setNone(currentElement.id)}
                      className={`flex justify-between items-center p-4 rounded-xl border-2 transition-all ${(!selections[currentElement.id] || selections[currentElement.id].length === 0) ? 'bg-slate-700 border-slate-500' : 'bg-slate-800 border-slate-700 opacity-60'}`}>
                      <span className="font-bold">NINGUNO / SIN ESTO</span>
                      <Icons.Close className="w-4 h-4" />
                    </button>
                  )}

                  {currentElement.items.map(item => {
                    const count = (selections[currentElement.id] || []).filter(s => s.id === item.id).length;
                    const isSelected = count > 0;

                    // Cumulative pricing logic for Fresas (1)
                    const isCumulativeProduct = product.id === 1;
                    const isStep0 = step === 0;
                    const isStep1 = step === 1;

                    let displayPrice = item.price;
                    let showPrice = item.price > 0;

                    if (isCumulativeProduct) {
                      if (isStep0) {
                        showPrice = false; // Hide price in first step
                      } else if (isStep1) {
                        const baseStepId = elements[0].id;
                        const baseItem = selections[baseStepId]?.[0];
                        const basePrice = baseItem?.price || 0;
                        displayPrice = basePrice + item.price;
                        showPrice = true;
                      }
                    }

                    return (
                      <button key={item.id} onClick={() => toggleItem(currentElement.id, item, currentElement.max, currentElement.allowRepeat, currentElement.type)}
                        className={`flex justify-between items-center p-4 rounded-xl border-2 transition-all active:scale-[0.98] ${isSelected ? 'bg-slate-700 border-pink-500 ring-2 ring-pink-500/20' : 'bg-slate-800 border-slate-700 text-slate-400'}`}>
                        <div className="text-left">
                          <span className="font-bold text-white uppercase block">{item.name} {count > 1 ? `x${count}` : ''}</span>
                          {showPrice && <span className="text-xs text-pink-400">{isCumulativeProduct && isStep1 ? '' : '+ '}${displayPrice}</span>}
                        </div>
                        {isSelected && <div className="bg-pink-500 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs animate-in zoom-in duration-200">✓</div>}
                      </button>
                    );
                  })}
                </div>
              </div>
            )}

            {isFinished && (
              <div className="space-y-6 animate-in fade-in zoom-in duration-300">
                <div className="text-center py-4">
                  <div className="text-6xl mb-4">😋</div>
                  <h3 className="text-2xl font-black">¡Todo listo!</h3>
                  <p className="text-slate-400">Revisa tu personalización:</p>
                </div>

                <div className="bg-slate-800/50 p-4 rounded-2xl border border-slate-700 divide-y divide-slate-700 space-y-4">
                  {variant && (
                    <div className="pt-0 pb-3 flex justify-between">
                      <span className="text-slate-400">Variante:</span>
                      <span className="font-bold text-white uppercase text-right">{variant.name}</span>
                    </div>
                  )}
                  {elements.map(el => {
                    const sels = selections[el.id] || [];
                    return (
                      <div key={el.id} className="py-3 flex justify-between gap-4">
                        <span className="text-slate-400">{el.name}:</span>
                        <span className="font-medium text-white text-right">{sels.length > 0 ? sels.map(s => s.name).join(', ') : 'Ninguno'}</span>
                      </div>
                    );
                  })}
                </div>

                {!initialValues && (
                  <div className="flex flex-col items-center gap-2">
                    <span className="text-xs font-bold text-slate-500 uppercase">Cantidad</span>
                    <div className="flex items-center bg-slate-800 rounded-2xl p-2 border border-slate-700 scale-110">
                      <button onClick={() => setQty(q => Math.max(1, q - 1))} className="w-12 h-12 text-slate-400 text-2xl">-</button>
                      <span className="w-12 text-center font-black text-white text-xl">{qty}</span>
                      <button onClick={() => setQty(q => q + 1)} className="w-12 h-12 text-white text-2xl">+</button>
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>

          <div className="bg-slate-800 p-4 border-t border-slate-700 flex gap-4 items-center">
            {step >= 0 && step < elements.length ? (
              currentElement.type === 'radio' ? null : (
                <button onClick={handleNext}
                  className="flex-1 bg-white text-slate-900 font-black py-4 rounded-2xl shadow-xl transition-all active:scale-95 flex items-center justify-center gap-2">
                  CONTINUAR <Icons.Back className="rotate-180 w-4 h-4" />
                </button>
              )
            ) : isFinished ? (
              <button onClick={handleConfirm}
                className="flex-1 bg-gradient-to-r from-pink-600 to-purple-600 animate-pulse-slow text-white font-black py-4 rounded-2xl shadow-xl shadow-pink-900/50 transition-all active:scale-95 flex justify-between px-8">
                <span>AGREGAR AL CARRITO</span>
                <span>${(calculateTotal() * qty).toFixed(2)}</span>
              </button>
            ) : null}
          </div>

          <style>{`
              @keyframes pulse-slow {
                0%, 100% { transform: scale(1); filter: brightness(1); }
                50% { transform: scale(1.02); filter: brightness(1.1); }
              }
              .animate-pulse-slow {
                animation: pulse-slow 2s infinite ease-in-out;
              }
            `}</style>
        </div>
      );
    }

    function TicketResultModal({ orderInfo, items, total, onClose }) {
      const ticketDataUrl = useMemo(() => generateTicketImage(items, orderInfo, total), [items, orderInfo, total]);

      return (
        <div className="fixed inset-0 z-[70] bg-slate-900 flex flex-col animate-in fade-in duration-500">

          {/* Full Screen Ticket Viewer */}
          <div className="flex-1 overflow-y-auto flex justify-center items-start pt-6 pb-48 scrollbar-hide px-2">
            <img src={ticketDataUrl} alt="Ticket Preview" className="w-full max-w-sm rounded-none shadow-2xl" style={{ objectFit: 'contain' }} />
          </div>

          {/* Floating Action Bar */}
          <div className="fixed bottom-0 left-0 right-0 bg-slate-800/95 backdrop-blur-md rounded-t-3xl border-t border-slate-700 p-5 shadow-[0_-10px_40px_rgba(0,0,0,0.6)] z-10 animate-in slide-in-from-bottom duration-500">
            <div className="max-w-md mx-auto">
              <div className="flex items-start gap-4 mb-4">
                <div className="text-4xl">🎟️</div>
                <div>
                  <h3 className="font-black text-xl text-white mb-1">¡Resumen Listo!</h3>
                  <p className="text-sm font-bold text-slate-300 leading-snug">
                    Muestra tu ticket en caja o díctaselo a quien te atienda para que preparen tu pedido.
                  </p>
                  <p className="text-xs text-slate-500 italic mt-1 pb-1">La app es solo una guía visual.</p>
                </div>
              </div>

              <div className="flex gap-2">
                <button onClick={() => {
                  const link = document.createElement('a');
                  link.download = `Ticket_${orderInfo.ticketId}.png`;
                  link.href = ticketDataUrl;
                  link.click();
                }} className="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg active:scale-95 text-sm flex items-center justify-center gap-2">
                  <Icons.Download className="w-5 h-5" /> Descargar
                </button>

                <button onClick={onClose} className="flex-1 bg-gradient-to-r from-emerald-600 to-teal-500 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg active:scale-95 text-sm flex items-center justify-center gap-2">
                  ¡Listo! Inicio
                </button>
              </div>

              <div className="mt-4 text-center">
                <div className="font-mono text-2xl text-yellow-500 font-bold tracking-widest">#{orderInfo.ticketId}</div>
              </div>
            </div>
          </div>
        </div>
      )
    }

    const { createRoot } = ReactDOM;
    createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
